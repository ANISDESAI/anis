<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irfaniya Masjid & Madarsa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">
<style>
/* Base Styles */
*{margin:0;padding:0;box-sizing:border-box;}
body {
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#a8e6cf,#dcedc1);
  color:#1b3a2e;
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.5;
}

/* Header */
header{
  text-align:center;
  padding:50px 20px 30px;
  position: sticky;
  top:0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  z-index: 10;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
header h1{
  font-size:32px;
  color:#006400;
  font-weight:700;
}
.urdu{
  font-family:'Noto Nastaliq Urdu',serif;
  font-size:24px;
  margin-top:5px;
  color:#004d00;
}
.subtitle{
  margin-top:4px;
  font-weight:400;
  color:#006400;
}

/* Container & Cards */
.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}
.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
  margin-bottom:25px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover{
  transform: translateY(-5px);
  box-shadow:0 25px 50px rgba(0,0,0,0.2);
}

/* Counter */
.counter{
  font-size:32px;
  font-weight:700;
  color:#006400;
  margin-top:10px;
}

/* Button Group */
.button-group{
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
  justify-content:center;
}
button{
  padding:14px 20px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:500;
  background:linear-gradient(135deg,#00c853,#64dd17);
  color:#fff;
  cursor:pointer;
  transition: all 0.3s ease;
  flex:1 1 140px;
  text-align:center;
}
button:hover{
  transform: translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* Tables */
.table-wrapper{
  overflow-x:auto;
  margin-top:20px;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:500px;
}
th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.1);
  white-space:nowrap;
  transition: background 0.3s ease;
}
th{
  background: rgba(0,128,0,0.3);
  color:#004d00;
  font-weight:600;
}
tr:hover td{
  background: rgba(0,128,0,0.1);
}

/* Responsive */
@media(max-width:768px){
  header h1{font-size:28px;}
  .urdu{font-size:22px;}
  .counter{font-size:28px;}
  table{min-width:400px;}
  th,td{padding:10px;font-size:14px;}
  .button-group{flex-direction:column;}
}
@media(max-width:480px){
  header h1{font-size:24px;}
  .urdu{font-size:20px;}
  .counter{font-size:24px;}
  table{min-width:350px;}
  th,td{padding:8px;font-size:13px;}
}
</style>
</head>
<body>

<header>
<h1>🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>
<div class="subtitle">Donation & Funds Management</div>
</header>

<div class="container">

<!-- Total Donation Card -->
<div class="card">
<h2>Total Donation & Balance</h2>
<div class="counter" id="donationCounter">₹ 0</div>
<div style="margin-top:10px;font-size:16px;">Balance: ₹ <span id="balance">0</span></div>
</div>

<!-- Donation & Funds Card -->
<div class="card">
<h2>Manage Donations & Funds</h2>
<div class="button-group">
<button onclick="showSection('donation')">Donation List</button>
<button onclick="showSection('kharcha')">Fund Used List</button>
</div>

<!-- Donation Section -->
<div id="donation" style="display:none;" class="table-wrapper">
<table id="donationTable">
<tr>
<th>Donation #</th>
<th>Name</th>
<th>Amount (₹)</th>
<th>Date</th>
<th>Payment Method</th>
</tr>
</table>
</div>

<!-- Kharcha Section -->
<div id="kharcha" style="display:none;" class="table-wrapper">
<table id="kharchaTable">
<tr>
<th>Kharcha #</th>
<th>Purpose</th>
<th>Amount (₹)</th>
<th>Date</th>
<th>Paid From</th>
</tr>
</table>
</div>

</div>

<script>
// Replace with your Apps Script Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec"; 
let donationList=[], kharchaList=[];

function showSection(id){
  document.getElementById('donation').style.display='none';
  document.getElementById('kharcha').style.display='none';
  document.getElementById(id).style.display='block';
  calculateTotals();
}

function formatIndianDate(isoDate){
  if(!isoDate) return "-";
  const d = new Date(isoDate);
  const day = ("0"+d.getDate()).slice(-2);
  const month = ("0"+(d.getMonth()+1)).slice(-2);
  const year = d.getFullYear();
  return `${day}-${month}-${year}`;
}

async function fetchData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    donationList = data.donations;
    kharchaList = data.kharcha;
    renderTables();
    calculateTotals();
  }catch(err){console.error(err);}
}

function renderTables(){
  const dTable=document.getElementById('donationTable');
  dTable.innerHTML="<tr><th>Donation #</th><th>Name</th><th>Amount (₹)</th><th>Date</th><th>Payment Method</th></tr>";
  donationList.forEach((d,i)=>{
    let row=dTable.insertRow();
    row.insertCell(0).innerText=i+1;
    row.insertCell(1).innerText=d.Name || "Anonymous";
    row.insertCell(2).innerText=d.Amount;
    row.insertCell(3).innerText = formatIndianDate(d.Date);
    row.insertCell(4).innerText=d.Method || "-";
  });

  const kTable=document.getElementById('kharchaTable');
  kTable.innerHTML="<tr><th>Kharcha #</th><th>Purpose</th><th>Amount (₹)</th><th>Date</th><th>Paid From</th></tr>";
  kharchaList.forEach((k,i)=>{
    let row=kTable.insertRow();
    row.insertCell(0).innerText=i+1;
    row.insertCell(1).innerText=k.Purpose;
    row.insertCell(2).innerText=k.Amount;
    row.insertCell(3).innerText = formatIndianDate(k.Date);
    row.insertCell(4).innerText = k.PaidFrom || "-";
  });
}

function calculateTotals(){
  let totalDonation = donationList.reduce((sum,d)=>sum+parseInt(d.Amount),0);
  let totalKharcha = kharchaList.reduce((sum,k)=>sum+parseInt(k.Amount),0);
  document.getElementById('balance').innerText = totalDonation - totalKharcha;
  animateCounter(totalDonation);
}

function animateCounter(target){
  let counter=document.getElementById('donationCounter');
  let count=0;
  let step=Math.ceil(target/120);
  let interval=setInterval(()=>{
    count+=step;
    if(count>=target){count=target;clearInterval(interval);}
    counter.innerText="₹ "+count;
  },15);
}

fetchData();
</script>
</body>
</html>
