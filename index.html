<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

/* Base */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#a8e6cf,#dcedc1);
  color:#2c3e50;
}

/* Header */
header{text-align:center;padding:60px 15px 40px;}
header h1{font-size:34px;color:#006400;}
.urdu{font-family:'Noto Nastaliq Urdu',serif;font-size:24px;color:#004d00;}
.subtitle{margin-top:5px;color:#006400;}

/* Container */
.container{max-width:1100px;margin:auto;padding:20px;}
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  margin-bottom:25px;
}

/* Counter */
.counter{
  font-size:28px;
  font-weight:700;
  color:#006400;
  margin-top:10px;
}

/* Buttons */
.button-group{
  display:flex;
  gap:15px;
  margin-top:20px;
}
.button-group button{
  flex:1;
  padding:12px 18px;
  border:none;
  border-radius:35px;
  font-size:15px;
  font-weight:600;
  background:linear-gradient(135deg,#00c853,#64dd17);
  color:#fff;
  cursor:pointer;
}

/* Table */
.table-wrapper{overflow-x:auto;margin-top:20px;}
table{width:100%;border-collapse:collapse;}
th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.1);
  font-size:14px;
}
th{background:rgba(0,200,83,0.3);color:#004d00;}

/* Prayer Grid Layout (2 Columns Proper Alignment) */
.prayer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 30px;
  margin-top:15px;
}

.prayer-box{
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(8px);
  padding:10px 15px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  color:#006400;
  display:flex;
  justify-content:space-between;
}

.prayer-box.highlight{
  border:2px solid gold;
}

/* Responsive */
@media(max-width:600px){
  .prayer-grid{
    grid-template-columns:1fr 1fr;
  }
}

</style>
</head>

<body>

<header>
<h1>🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>
<div class="subtitle">Donation & Funds Management</div>
</header>

<div class="container">

<!-- Prayer Card -->
<div class="card">
<h2>Prayer Timings</h2>

<div class="prayer-grid">
  <div class="prayer-box" id="FajrBox">Fajr <span id="fajrClock"></span></div>
  <div class="prayer-box" id="MaghribBox">Maghrib <span id="maghribClock"></span></div>

  <div class="prayer-box" id="DhuhrBox">Zohar <span id="dhuhrClock"></span></div>
  <div class="prayer-box" id="IshaBox">Isha <span id="ishaClock"></span></div>

  <div class="prayer-box" id="AsrBox">Asar <span id="asrClock"></span></div>
  <div class="prayer-box" id="JumaBox">Juma <span>01:30 PM</span></div>
</div>

</div>

<!-- Donation Card -->
<div class="card">
<h2>Total Donation & Balance</h2>
<div class="counter" id="donationCounter">₹ 0</div>
<div style="margin-top:8px;">Balance: ₹ <span id="balance">0</span></div>
</div>

<!-- Manage -->
<div class="card">
<h2>Manage Donations & Funds</h2>

<div class="button-group">
<button onclick="showSection('donation')">Donation List</button>
<button onclick="showSection('kharcha')">Fund Used List</button>
</div>

<div id="donation" style="display:none;" class="table-wrapper">
<table id="donationTable">
<tr>
<th>#</th><th>Name</th><th>Amount</th><th>Date</th><th>Method</th>
</tr>
</table>
</div>

<div id="kharcha" style="display:none;" class="table-wrapper">
<table id="kharchaTable">
<tr>
<th>#</th><th>Purpose</th><th>Amount</th><th>Date</th><th>Paid From</th>
</tr>
</table>
</div>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec";
let donationList=[],kharchaList=[];

function showSection(id){
  document.getElementById('donation').style.display='none';
  document.getElementById('kharcha').style.display='none';
  document.getElementById(id).style.display='block';
}

async function fetchData(){
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    donationList=data.donations;
    kharchaList=data.kharcha;
    renderTables();
    calculateTotals();
  }catch(err){console.log(err);}
}

function renderTables(){
  const dTable=document.getElementById('donationTable');
  donationList.forEach((d,i)=>{
    let r=dTable.insertRow();
    r.insertCell(0).innerText=i+1;
    r.insertCell(1).innerText=d.Name||"Anonymous";
    r.insertCell(2).innerText=d.Amount;
    r.insertCell(3).innerText=d.Date;
    r.insertCell(4).innerText=d.Method||"-";
  });

  const kTable=document.getElementById('kharchaTable');
  kharchaList.forEach((k,i)=>{
    let r=kTable.insertRow();
    r.insertCell(0).innerText=i+1;
    r.insertCell(1).innerText=k.Purpose;
    r.insertCell(2).innerText=k.Amount;
    r.insertCell(3).innerText=k.Date;
    r.insertCell(4).innerText=k.PaidFrom||"-";
  });
}

function calculateTotals(){
  let totalDonation=donationList.reduce((s,d)=>s+parseInt(d.Amount),0);
  let totalKharcha=kharchaList.reduce((s,k)=>s+parseInt(k.Amount),0);
  document.getElementById('donationCounter').innerText="₹ "+totalDonation;
  document.getElementById('balance').innerText=totalDonation-totalKharcha;
}

/* Prayer Times */
const prayerTimes={
  Fajr:"06:05",
  Dhuhr:"13:30",
  Asr:"17:35",
  Maghrib:"18:30",
  Isha:"20:45"
};

function updatePrayerClock(){
  Object.keys(prayerTimes).forEach(p=>{
    const [h,m]=prayerTimes[p].split(":");
    let ampm=h>=12?"PM":"AM";
    let h12=h%12||12;
    document.getElementById(p.toLowerCase()+"Clock").innerText=
    h12.toString().padStart(2,"0")+":"+m+" "+ampm;
  });
}

setInterval(updatePrayerClock,1000);
updatePrayerClock();
fetchData();

</script>

</body>
</html>
