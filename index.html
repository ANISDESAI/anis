<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#a8e6cf,#dcedc1);
  color:#2c3e50;
}

/* Language Buttons */
.lang-buttons{
  position:fixed;
  top:15px;
  left:15px;
  display:flex;
  gap:10px;
  z-index:1000;
}
.lang-buttons button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  background:#006400;
  color:#fff;
}

header{text-align:center;padding:60px 15px 40px;}
header h1{font-size:34px;color:#006400;}
.urdu{font-family:'Noto Nastaliq Urdu',serif;font-size:24px;color:#004d00;}
.subtitle{margin-top:5px;color:#006400;}

.container{max-width:1100px;margin:auto;padding:20px;}
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  margin-bottom:25px;
}

.totals-container{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:10px;
  flex-wrap:wrap;
}
.total-box{
  flex:1;
  padding:25px 20px;
  border-radius:15px;
  text-align:center;
  font-weight:600;
  color:#fff;
  font-size:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.total-box h3{margin-bottom:12px;font-size:16px;}

.total-donation{background:linear-gradient(135deg,#00c853,#66ff66);}
.total-used{background:linear-gradient(135deg,#d50000,#ff6659);}
.total-balance{background:linear-gradient(135deg,#ffb300,#ffe066);color:#004d00;}

.button-group{
  display:flex;
  gap:15px;
  margin-top:20px;
}
.button-group button{
  flex:1;
  padding:12px 18px;
  border:none;
  border-radius:35px;
  font-size:15px;
  font-weight:600;
  background:linear-gradient(135deg,#00c853,#64dd17);
  color:#fff;
  cursor:pointer;
}

.table-wrapper{overflow-x:auto;margin-top:20px;}
table{width:100%;border-collapse:collapse;}
th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.1);
  font-size:14px;
}
th{background:rgba(0,200,83,0.3);color:#004d00;}

.prayer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px 40px;
  margin-top:15px;
}

.prayer-box{
  background:rgba(255,255,255,0.5);
  padding:12px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  color:#006400;
  text-align:center;
}

.prayer-time{
  display:block;
  margin-top:4px;
  font-weight:500;
}
</style>
</head>
<body>

<!-- Language Buttons -->
<div class="lang-buttons">
  <button onclick="setLanguage('en')">English</button>
  <button onclick="setLanguage('hi')">हिन्दी</button>
</div>

<header>
<h1 id="mainTitle">🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>
<div class="subtitle" id="subtitle">Donation & Funds Management</div>
</header>

<div class="container">

<div class="card">
<h2 id="namazTitle">Namaz Timings (Mumbai)</h2>
<div class="prayer-grid">
  <div class="prayer-box"><span id="fajrLabel">Fajr</span> <span class="prayer-time" id="fajrClock">Loading...</span></div>
  <div class="prayer-box"><span id="maghribLabel">Maghrib</span> <span class="prayer-time" id="maghribClock">Loading...</span></div>
  <div class="prayer-box"><span id="zoharLabel">Zohar</span> <span class="prayer-time" id="dhuhrClock">Loading...</span></div>
  <div class="prayer-box"><span id="ishaLabel">Isha</span> <span class="prayer-time" id="ishaClock">Loading...</span></div>
  <div class="prayer-box"><span id="asarLabel">Asar</span> <span class="prayer-time" id="asrClock">Loading...</span></div>
  <div class="prayer-box"><span id="jumaLabel">Juma</span> <span class="prayer-time">01:30 PM</span></div>
</div>
</div>

<div class="card">
<h2 id="summaryTitle">Summary</h2>
<div class="totals-container">
  <div class="total-box total-donation">
    <h3 id="totalDonationLabel">Total Donation</h3>
    <div id="donationCounter">₹ 0</div>
  </div>
  <div class="total-box total-used">
    <h3 id="donationUsedLabel">Donation Used</h3>
    <div id="donationUsed">₹ 0</div>
  </div>
  <div class="total-box total-balance">
    <h3 id="balanceLabel">Balance</h3>
    <div id="balance">₹ 0</div>
  </div>
</div>
</div>

</div>

<script>
function setLanguage(lang){
  if(lang === "hi"){
    document.getElementById("subtitle").innerText = "दान और फंड प्रबंधन";
    document.getElementById("namazTitle").innerText = "नमाज़ के समय (मुंबई)";
    document.getElementById("summaryTitle").innerText = "सारांश";
    document.getElementById("totalDonationLabel").innerText = "कुल दान";
    document.getElementById("donationUsedLabel").innerText = "खर्च की गई राशि";
    document.getElementById("balanceLabel").innerText = "शेष राशि";
    document.getElementById("fajrLabel").innerText = "फ़ज्र";
    document.getElementById("zoharLabel").innerText = "ज़ोहर";
    document.getElementById("asarLabel").innerText = "असर";
    document.getElementById("maghribLabel").innerText = "मग़रिब";
    document.getElementById("ishaLabel").innerText = "ईशा";
    document.getElementById("jumaLabel").innerText = "जुमा";
  } else {
    document.getElementById("subtitle").innerText = "Donation & Funds Management";
    document.getElementById("namazTitle").innerText = "Namaz Timings (Mumbai)";
    document.getElementById("summaryTitle").innerText = "Summary";
    document.getElementById("totalDonationLabel").innerText = "Total Donation";
    document.getElementById("donationUsedLabel").innerText = "Donation Used";
    document.getElementById("balanceLabel").innerText = "Balance";
    document.getElementById("fajrLabel").innerText = "Fajr";
    document.getElementById("zoharLabel").innerText = "Zohar";
    document.getElementById("asarLabel").innerText = "Asar";
    document.getElementById("maghribLabel").innerText = "Maghrib";
    document.getElementById("ishaLabel").innerText = "Isha";
    document.getElementById("jumaLabel").innerText = "Juma";
  }
}
</script>

</body>
</html>
